<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace - AutoLuxe</title>
  <script src="../assets/js/page-boot.js"></script>
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
  <link rel="stylesheet" href="../assets/css/marketplace.css">
  <link rel="stylesheet" href="../assets/css/notification.css">
</head>
<body>

  <div class="al-page-transition" id="alPageTransition" aria-hidden="true">
    <div class="al-page-transition__inner">
      <span class="al-page-transition__brand">Auto<span>Luxe</span></span>
    </div>
  </div>
  <script>
    (function () {
      var o = document.getElementById('alPageTransition');
      if (!o) return;
      try {
        if (sessionStorage.getItem('autoluxe_page_nav')) {
          o.classList.add('is-active');
          sessionStorage.removeItem('autoluxe_page_nav');
        }
        if (sessionStorage.getItem('autoluxe_home_preload')) {
          o.classList.add('is-active', 'is-home-preload');
        }
      } catch (e) { /* ignore */ }
    })();
  </script>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container">
      <a href="../index.html" class="site-header__brand">Auto<span>Luxe</span></a>

      <nav class="site-nav" id="siteNav">
        <ul class="site-nav__list">
                    <li><a href="../index.html" class="site-nav__link" data-i18n="nav.home">Trang chủ</a></li>
          <li><a href="./catalog.html" class="site-nav__link" data-i18n="nav.catalog">Catalog</a></li>
          <li><a href="./marketplace.html" class="site-nav__link" data-i18n="nav.marketplace">Marketplace</a></li>
          <li><a href="./wishlist.html" class="site-nav__link" data-i18n="nav.wishlist">Yêu thích</a></li>
          <li><a href="./compare.html" class="site-nav__link" data-i18n="nav.compare">So sánh</a></li>
        </ul>
      </nav>

      <div class="site-header__cta">
        <a href="./auth.html" class="btn btn--primary btn--sm" data-i18n="common.login">Đăng nhập</a>
      </div>

      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="site-main">
    <section class="section">
      <div class="container">
        <div class="market-header">
          <div>
            <h1 class="section-title" data-i18n="market.title">Marketplace</h1>
            <div class="divider"></div>
            <p class="section-subtitle" style="margin-bottom:0;" data-i18n="market.subtitle">Mua bán siêu xe từ cộng đồng AutoLuxe.</p>
          </div>
          <a href="./post-editor.html" class="btn btn--primary" data-i18n="market.post_new">+ Đăng tin mới</a>
        </div>

        <!-- Search/Filter -->
        <div class="market-filters">
          <div class="input-group market-filters__search">
            <label class="label" for="marketSearch" data-i18n="market.search_label">Tìm kiếm</label>
            <input type="text" class="input" id="marketSearch" placeholder="Tìm theo tên xe, hãng, model..." data-i18n-placeholder="market.search_placeholder">
          </div>
          <div class="input-group market-filters__brand">
            <label class="label" for="marketBrand" data-i18n="market.brand_label">Hãng xe</label>
            <select class="input" id="marketBrand">
              <option value="" data-i18n="common.all">Tất cả</option>
              <option value="Ferrari">Ferrari</option>
              <option value="Lamborghini">Lamborghini</option>
              <option value="McLaren">McLaren</option>
              <option value="Porsche">Porsche</option>
              <option value="Bugatti">Bugatti</option>
              <option value="Aston Martin">Aston Martin</option>
              <option value="Koenigsegg">Koenigsegg</option>
            </select>
          </div>
          <div class="input-group market-filters__sort">
            <label class="label" for="marketSort" data-i18n="market.sort_label">Sắp xếp</label>
            <select class="input" id="marketSort">
              <option value="newest" data-i18n="market.sort_newest">Mới nhất</option>
              <option value="price-asc" data-i18n="market.sort_price_asc">Giá tăng</option>
              <option value="price-desc" data-i18n="market.sort_price_desc">Giá giảm</option>
            </select>
          </div>
          <div class="input-group market-filters__field">
            <label class="label" for="marketMinPrice" data-i18n="saved_search.min_price">Giá từ</label>
            <input type="number" class="input" id="marketMinPrice" min="0" step="1000">
          </div>
          <div class="input-group market-filters__field">
            <label class="label" for="marketMaxPrice" data-i18n="saved_search.max_price">Giá đến</label>
            <input type="number" class="input" id="marketMaxPrice" min="0" step="1000">
          </div>
          <div class="input-group market-filters__save">
            <label class="label">&nbsp;</label>
            <button type="button" class="btn btn--secondary" id="btnSaveSearch" data-i18n="saved_search.save_btn">Lưu tìm kiếm</button>
          </div>
        </div>

        <!-- State (empty/error) -->
        <div id="marketState"></div>

        <!-- Listing Grid -->
        <div class="market-grid" id="marketGrid"></div>
      </div>
    </section>
  </main>
  <!-- FOOTER -->
  <footer class="site-footer site-footer--compact">
    <div class="container site-footer__compact">
      <a href="../index.html" class="site-footer__brand">Auto<span>Luxe</span></a>
      <p class="site-footer__compact-copy" data-i18n="footer.copyright">&copy; 2024 AutoLuxe. All rights reserved.</p>
    </div>
  </footer>

  <script src="../assets/js/config.example.js"></script>
  <script src="../assets/js/config.local.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/data-provider.js"></script>
  <script src="../assets/js/saved-search-service.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script>I18n.initI18n();</script>
  <script src="../assets/js/account.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/toast.js"></script>
  <script src="../assets/js/notifications.js"></script>
  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/motion-prefs.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script src="../assets/js/confirm-dialog.js"></script>
  <script src="../assets/js/marketplace.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      Marketplace.initListPage();
    });
  </script>
  <script>
    (function(){if(!window.chatbase||window.chatbase("getState")!=="initialized"){window.chatbase=(...arguments)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(arguments)};window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})}const onLoad=function(){const script=document.createElement("script");script.src="https://www.chatbase.co/embed.min.js";script.id="5LOi2m9SeAC0XdgMumJPW";script.domain="www.chatbase.co";document.body.appendChild(script)};if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}})();
    </script>
</body>
</html>
