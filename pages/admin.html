<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-page-title="admin.page_title">Quản trị - AutoLuxe</title>
  <script>
    (function(){var t=localStorage.getItem('autoluxe_theme');if(t==='dark'||t==='light'){document.documentElement.setAttribute('data-theme',t)}else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches){document.documentElement.setAttribute('data-theme','dark')}else{document.documentElement.setAttribute('data-theme','light')}})();
    (function(){var l=localStorage.getItem('autoluxe_locale');if(l==='vi'||l==='en'){document.documentElement.lang=l}})();
  </script>
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/notification.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="../index.html" class="site-header__brand">Auto<span>Luxe</span></a>

      <nav class="site-nav" id="siteNav">
        <ul class="site-nav__list">
                    <li><a href="../index.html" class="site-nav__link" data-i18n="nav.home">Trang chủ</a></li>
          <li><a href="./catalog.html" class="site-nav__link" data-i18n="nav.catalog">Catalog</a></li>
          <li><a href="./marketplace.html" class="site-nav__link" data-i18n="nav.marketplace">Marketplace</a></li>
          <li><a href="./wishlist.html" class="site-nav__link" data-i18n="nav.wishlist">Yêu thích</a></li>
          <li><a href="./compare.html" class="site-nav__link" data-i18n="nav.compare">So sánh</a></li>
        </ul>
      </nav>

      <div class="site-header__cta">
        <a href="./auth.html" class="btn btn--primary btn--sm" data-i18n="common.login">Đăng nhập</a>
      </div>

      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
      </button>
    </div>
  </header>

  <main class="site-main">
    <section class="section">
      <div class="container admin-container">
        <div id="adminGate"></div>

        <div id="adminApp" class="admin-app" hidden>
          <div class="admin-header">
            <h1 class="section-title" data-i18n="admin.title">Bảng Quản Trị</h1>
            <div class="divider"></div>
            <p class="section-subtitle" data-i18n="admin.subtitle">Duyệt tin rao và phản hồi đơn mua với ghi chú cho người dùng.</p>
            <a href="./qa.html" class="btn btn--secondary btn--sm">Open QA Center</a>
          </div>

          <div id="adminStats" class="admin-stats-grid"></div>

          <div class="account-tabs auth-tabs admin-tabs tab-strip" role="tablist">
            <button type="button" class="btn btn--secondary btn--sm is-active-tab" id="adminTabPosts" data-i18n="admin.tab_posts">Duyệt tin rao</button>
            <button type="button" class="btn btn--secondary btn--sm" id="adminTabOrders" data-i18n="admin.tab_orders">Quản lý đơn hàng</button>
          </div>

          <div id="adminPanelPosts" class="admin-panel">
            <h2 class="admin-section-title" data-i18n="admin.queue_title">Tin chờ duyệt</h2>
            <div id="adminPostsQueue" class="admin-posts-queue"></div>
          </div>

          <div id="adminPanelOrders" class="admin-panel" hidden>
            <h2 class="admin-section-title" data-i18n="admin.order_list_title">Danh sách đơn hàng</h2>
            <div id="adminOrdersList" class="admin-orders-list"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="adminRejectModal" class="admin-modal" hidden aria-hidden="true">
    <div class="admin-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="adminRejectTitle">
      <button type="button" class="admin-modal__close" id="adminRejectClose" aria-label="Close" data-i18n-aria-label="common.close">&times;</button>
      <h2 id="adminRejectTitle" class="admin-modal__title" data-i18n="admin.reject_modal_title">Từ chối tin rao</h2>
      <div class="input-group">
        <label class="label" for="adminRejectReason" data-i18n="admin.reject_reason_label">Lý do từ chối *</label>
        <textarea class="input" id="adminRejectReason" rows="4" data-i18n-placeholder="admin.reject_reason_ph" placeholder="Nhập lý do..."></textarea>
      </div>
      <div class="admin-modal__actions">
        <button type="button" class="btn btn--secondary" id="adminRejectCancel" data-i18n="common.cancel">Hủy</button>
        <button type="button" class="btn btn--danger" id="adminRejectConfirm" data-i18n="admin.reject_confirm_btn">Xác nhận từ chối</button>
      </div>
    </div>
  </div>
  <!-- FOOTER -->
  <footer class="site-footer site-footer--compact">
    <div class="container site-footer__compact">
      <a href="../index.html" class="site-footer__brand">Auto<span>Luxe</span></a>
      <p class="site-footer__compact-copy" data-i18n="footer.copyright">&copy; 2024 AutoLuxe. All rights reserved.</p>
    </div>
  </footer>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script>I18n.initI18n();</script>
  <script src="../assets/js/account.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/toast.js"></script>
  <script src="../assets/js/notifications.js"></script>
  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/motion-prefs.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/seed.js"></script>
  <script src="../assets/js/marketplace.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      Admin.init();
    });
  </script>
</body>
</html>
