<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - AutoLuxe</title>
  <script src="../assets/js/page-boot.js"></script>
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
  <link rel="stylesheet" href="../assets/css/notification.css">
</head>
<body>

  <div class="al-page-transition" id="alPageTransition" aria-hidden="true">
    <div class="al-page-transition__inner">
      <span class="al-page-transition__brand">Auto<span>Luxe</span></span>
    </div>
  </div>
  <script>
    (function () {
      var o = document.getElementById('alPageTransition');
      if (!o) return;
      try {
        if (sessionStorage.getItem('autoluxe_page_nav')) {
          o.classList.add('is-active');
          sessionStorage.removeItem('autoluxe_page_nav');
        }
        if (sessionStorage.getItem('autoluxe_home_preload')) {
          o.classList.add('is-active', 'is-home-preload');
        }
      } catch (e) { /* ignore */ }
    })();
  </script>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container">
      <a href="../index.html" class="site-header__brand">Auto<span>Luxe</span></a>

      <nav class="site-nav" id="siteNav">
        <ul class="site-nav__list">
                    <li><a href="../index.html" class="site-nav__link" data-i18n="nav.home">Trang chủ</a></li>
          <li><a href="./catalog.html" class="site-nav__link" data-i18n="nav.catalog">Catalog</a></li>
          <li><a href="./marketplace.html" class="site-nav__link" data-i18n="nav.marketplace">Marketplace</a></li>
          <li><a href="./wishlist.html" class="site-nav__link" data-i18n="nav.wishlist">Yêu thích</a></li>
          <li><a href="./compare.html" class="site-nav__link" data-i18n="nav.compare">So sánh</a></li>
        </ul>
      </nav>

      <div class="site-header__cta">
        <a href="./auth.html" class="btn btn--primary btn--sm" data-i18n="common.login">Đăng nhập</a>
      </div>

      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="site-main">
    <section class="section">
      <div class="container auth-container">
        <h1 class="section-title section-title--center" data-i18n="auth.title">Tài Khoản</h1>
        <div class="divider divider--center"></div>
        <p class="section-subtitle section-subtitle--center" data-i18n="auth.subtitle">Đăng nhập hoặc tạo tài khoản mới để sử dụng đầy đủ tính năng AutoLuxe.</p>

        <!-- Logged-in state message -->
        <div id="authLoggedIn" style="display:none; text-align:center; margin-bottom:var(--space-xl);">
          <p style="color:var(--color-success); font-size:var(--fs-lg); margin-bottom:var(--space-md);">Bạn đã đăng nhập với tên <strong id="loggedInName"></strong></p>
          <button class="btn btn--secondary" id="btnAuthLogout" data-i18n="common.logout">Đăng xuất</button>
        </div>

        <!-- Auth forms wrapper (hidden when logged in) -->
        <div id="authFormsWrapper">
          <!-- Tab Switch -->
          <div class="auth-tabs tab-strip">
            <button class="btn btn--primary btn--sm is-active-tab" id="tabLogin" type="button" data-i18n="auth.tab_login">Đăng nhập</button>
            <button class="btn btn--secondary btn--sm" id="tabRegister" type="button" data-i18n="auth.tab_register">Đăng ký</button>
          </div>

          <div class="auth-forms-stack">
          <!-- Login Form -->
          <form id="loginForm" class="auth-form-panel is-active" method="post" action="./auth.html" novalidate autocomplete="on">
            <div class="auth-message auth-message--error" id="loginError"></div>
            <div class="auth-message auth-message--success" id="loginSuccess"></div>

            <div class="input-group">
              <label class="label" for="loginEmail" data-i18n="auth.email_label">Email *</label>
              <input type="email" class="input" id="loginEmail" name="username" placeholder="you@example.com" data-i18n-placeholder="auth.email_ph" autocomplete="username" inputmode="email" autocapitalize="none" spellcheck="false" required>
              <span class="field-error" id="loginEmailError"></span>
            </div>

            <div class="input-group">
              <label class="label" for="loginPassword" data-i18n="auth.password_label">Mật khẩu *</label>
              <input type="password" class="input" id="loginPassword" name="password" placeholder="Nhập mật khẩu..." data-i18n-placeholder="auth.password_ph" autocomplete="current-password" required>
              <span class="field-error" id="loginPasswordError"></span>
            </div>

            <button type="submit" class="btn btn--primary btn--lg" id="loginSubmit" style="width:100%; margin-top:var(--space-md);" data-i18n="auth.login_btn">Đăng nhập</button>
          </form>

          <!-- Register Form -->
          <form id="registerForm" class="auth-form-panel" method="post" action="./auth.html" novalidate autocomplete="off" hidden>
            <div class="auth-message auth-message--error" id="registerError"></div>
            <div class="auth-message auth-message--success" id="registerSuccess"></div>

            <div class="input-group">
              <label class="label" for="regName" data-i18n="auth.name_label">Tên hiển thị *</label>
              <input type="text" class="input" id="regName" name="name" placeholder="Tên của bạn (ít nhất 2 ký tự)" data-i18n-placeholder="auth.name_ph" autocomplete="name">
              <span class="field-error" id="regNameError"></span>
            </div>

            <div class="input-group">
              <label class="label" for="regEmail" data-i18n="auth.email_label">Email *</label>
              <input type="email" class="input" id="regEmail" name="email" placeholder="you@example.com" data-i18n-placeholder="auth.email_ph" autocomplete="email" inputmode="email" autocapitalize="none" spellcheck="false">
              <span class="field-error" id="regEmailError"></span>
            </div>

            <div class="input-group">
              <label class="label" for="regPassword" data-i18n="auth.password_label">Mật khẩu *</label>
              <input type="password" class="input" id="regPassword" name="password" placeholder="Tối thiểu 6 ký tự" data-i18n-placeholder="auth.min_6_chars" autocomplete="new-password">
              <span class="field-error" id="regPasswordError"></span>
            </div>

            <div class="input-group">
              <label class="label" for="regConfirm" data-i18n="auth.confirm_label">Xác nhận mật khẩu *</label>
              <input type="password" class="input" id="regConfirm" name="confirm-password" placeholder="Nhập lại mật khẩu" data-i18n-placeholder="auth.confirm_ph" autocomplete="new-password">
              <span class="field-error" id="regConfirmError"></span>
            </div>

            <button type="submit" class="btn btn--primary btn--lg" id="registerSubmit" style="width:100%; margin-top:var(--space-md);" data-i18n="auth.register_btn">Tạo tài khoản</button>
          </form>
          </div>
        </div>
      </div>
    </section>
  </main>
  <!-- FOOTER -->
  <footer class="site-footer site-footer--compact">
    <div class="container site-footer__compact">
      <a href="../index.html" class="site-footer__brand">Auto<span>Luxe</span></a>
      <p class="site-footer__compact-copy" data-i18n="footer.copyright">&copy; 2024 AutoLuxe. All rights reserved.</p>
    </div>
  </footer>

  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script>I18n.initI18n();</script>
  <script src="../assets/js/account.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/toast.js"></script>
  <script src="../assets/js/notifications.js"></script>
  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/motion-prefs.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    (function () {
      'use strict';

      // DOM references
      var tabLogin = document.getElementById('tabLogin');
      var tabRegister = document.getElementById('tabRegister');
      var loginForm = document.getElementById('loginForm');
      var registerForm = document.getElementById('registerForm');
      var authFormsWrapper = document.getElementById('authFormsWrapper');
      var authLoggedIn = document.getElementById('authLoggedIn');
      var loggedInName = document.getElementById('loggedInName');
      var btnAuthLogout = document.getElementById('btnAuthLogout');

      // Check if already logged in
      function checkAuthState() {
        var session = Auth.getSession();
        if (session) {
          authFormsWrapper.style.display = 'none';
          authLoggedIn.style.display = 'block';
          loggedInName.textContent = session.fullName;
        } else {
          authFormsWrapper.style.display = 'block';
          authLoggedIn.style.display = 'none';
        }
      }

      checkAuthState();

      // Logout from auth page
      btnAuthLogout.addEventListener('click', function () {
        Auth.logout();
        Auth.updateHeaderUI();
        checkAuthState();
        clearAllErrors();
      });

      // Global resetAuthForms for auth.js logout callback
      window.resetAuthForms = function () {
        checkAuthState();
      };

      function updateAuthTabIndicator(activeBtn) {
        var strip = document.querySelector('.auth-tabs');
        if (!strip || !activeBtn) return;
        var motion = window.AutoLuxeMotion;
        if (motion && typeof motion.updateTabStripIndicator === 'function') {
          motion.updateTabStripIndicator(strip, activeBtn);
          return;
        }
        var stripRect = strip.getBoundingClientRect();
        var btnRect = activeBtn.getBoundingClientRect();
        var left = btnRect.left - stripRect.left + strip.scrollLeft;
        strip.style.setProperty('--tab-indicator-left', left + 'px');
        strip.style.setProperty('--tab-indicator-width', btnRect.width + 'px');
      }

      // Tab switching (crossfade)
      function showTab(tab) {
        clearAllErrors();
        var isLogin = tab === 'login';
        loginForm.classList.toggle('is-active', isLogin);
        registerForm.classList.toggle('is-active', !isLogin);
        loginForm.hidden = !isLogin;
        registerForm.hidden = isLogin;
        loginForm.setAttribute('autocomplete', isLogin ? 'on' : 'off');
        registerForm.setAttribute('autocomplete', isLogin ? 'off' : 'on');

        if (isLogin) {
          tabLogin.className = 'btn btn--primary btn--sm is-active-tab';
          tabRegister.className = 'btn btn--secondary btn--sm';
          updateAuthTabIndicator(tabLogin);
        } else {
          tabLogin.className = 'btn btn--secondary btn--sm';
          tabRegister.className = 'btn btn--primary btn--sm is-active-tab';
          updateAuthTabIndicator(tabRegister);
        }
      }

      tabLogin.addEventListener('click', function () { showTab('login'); });
      tabRegister.addEventListener('click', function () { showTab('register'); });
      showTab('login');
      window.addEventListener('resize', function () {
        var activeAuthTab = document.querySelector('.auth-tabs .is-active-tab');
        if (activeAuthTab) updateAuthTabIndicator(activeAuthTab);
      });

      // Error helpers
      function showFieldError(fieldId, message) {
        var input = document.getElementById(fieldId);
        var errorEl = document.getElementById(fieldId + 'Error');
        if (input) input.classList.add('input--error');
        if (errorEl) {
          errorEl.textContent = message;
          errorEl.classList.add('is-visible');
        }
      }

      function clearFieldError(fieldId) {
        var input = document.getElementById(fieldId);
        var errorEl = document.getElementById(fieldId + 'Error');
        if (input) input.classList.remove('input--error');
        if (errorEl) {
          errorEl.textContent = '';
          errorEl.classList.remove('is-visible');
        }
      }

      function showFormMessage(id, message) {
        var el = document.getElementById(id);
        if (el) {
          el.textContent = message;
          el.classList.add('is-visible');
        }
      }

      function hideFormMessage(id) {
        var el = document.getElementById(id);
        if (el) {
          el.textContent = '';
          el.classList.remove('is-visible');
        }
      }

      function clearAllErrors() {
        var fields = ['loginEmail', 'loginPassword', 'regName', 'regEmail', 'regPassword', 'regConfirm'];
        fields.forEach(function (f) { clearFieldError(f); });
        hideFormMessage('loginError');
        hideFormMessage('loginSuccess');
        hideFormMessage('registerError');
        hideFormMessage('registerSuccess');
      }

      function getLoginRedirectUrl() {
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get('redirect');
        if (redirect) return redirect;
        return '../index.html';
      }

      // LOGIN FORM SUBMIT
      loginForm.addEventListener('submit', function (e) {
        e.preventDefault();
        clearAllErrors();

        var email = document.getElementById('loginEmail').value;
        var password = document.getElementById('loginPassword').value;

        var loginBtn = document.getElementById('loginSubmit');
        loginBtn.disabled = true;
        loginBtn.textContent = _t('common.processing');

        var result = Auth.login(email, password);

        if (!result.success) {
          result.errors.forEach(function (err) {
            showFieldError(err.field, err.message);
          });
          if (result.errors.length > 0) {
            var firstField = document.getElementById(result.errors[0].field);
            if (firstField) firstField.focus();
          }
          loginBtn.disabled = false;
          loginBtn.textContent = _t('auth.login_btn');
          return;
        }

        showFormMessage('loginSuccess', _t('auth.login_success'));
        Auth.updateHeaderUI();

        // Full navigation helps browsers offer "Save password"
        window.location.assign(getLoginRedirectUrl());
      });

      // REGISTER FORM SUBMIT
      registerForm.addEventListener('submit', function (e) {
        e.preventDefault();
        clearAllErrors();

        var fullName = document.getElementById('regName').value;
        var email = document.getElementById('regEmail').value;
        var password = document.getElementById('regPassword').value;
        var confirm = document.getElementById('regConfirm').value;

        var regBtn = document.getElementById('registerSubmit');
        regBtn.disabled = true;
        regBtn.textContent = _t('common.processing');

        setTimeout(function () {
          var result = Auth.register(fullName, email, password, confirm);

          if (!result.success) {
            result.errors.forEach(function (err) {
              showFieldError(err.field, err.message);
            });
            // Focus first error field
            if (result.errors.length > 0) {
              var firstField = document.getElementById(result.errors[0].field);
              if (firstField) firstField.focus();
            }
          } else {
            showFormMessage('registerSuccess', _t('auth.register_success'));
            Auth.updateHeaderUI();

            setTimeout(function () {
              window.location.href = '../index.html';
            }, 800);
          }

          regBtn.disabled = false;
          regBtn.textContent = _t('auth.register_btn');
        }, 300);
      });

    })();
  </script>
</body>
</html>
